<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasty Admin — Menü verwalten</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0705;
  --bg2: #130d09;
  --bg3: #1c1208;
  --ink: #f8ede0;
  --muted: #a89581;
  --ember: #ff6a1f;
  --ember-glow: #ffb347;
  --chili: #e11414;
  --mint: #7cc66e;
  --border: rgba(248,237,224,0.08);
  --border-hover: rgba(255,106,31,0.3);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, rgba(255,106,31,0.12) 0%, transparent 65%);
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.login-box h1 {
  font-family: 'Fraunces', serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.login-box h1 em { font-style: italic; color: var(--ember); }
.login-box p { color: var(--muted); margin-bottom: 32px; font-size: 0.9rem; }
.login-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
  margin-bottom: 14px;
  text-align: center;
  letter-spacing: 0.1em;
}
.login-input:focus { border-color: var(--ember); box-shadow: 0 0 0 3px rgba(255,106,31,0.12); }
.login-btn {
  width: 100%;
  background: var(--ember);
  color: #0a0705;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.25s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.login-btn:hover { background: var(--ember-glow); transform: translateY(-1px); }
.login-error { color: var(--chili); font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

/* ── APP ── */
#app { display: none; }

.topbar {
  background: rgba(10,7,5,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-family: 'Fraunces', serif;
  font-size: 1.3rem;
  font-weight: 700;
}
.topbar-title em { color: var(--ember); font-style: italic; }
.topbar-actions { display: flex; gap: 12px; align-items: center; }
.btn { padding: 9px 20px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.2s; letter-spacing: 0.04em; text-transform: uppercase; }
.btn-primary { background: var(--ember); color: #0a0705; }
.btn-primary:hover { background: var(--ember-glow); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--ember); color: var(--ember); }
.btn-danger { background: rgba(225,20,20,0.12); border: 1px solid rgba(225,20,20,0.2); color: var(--chili); }
.btn-danger:hover { background: rgba(225,20,20,0.2); }
.btn-sm { padding: 6px 14px; font-size: 0.78rem; }
.btn-success { background: rgba(124,198,110,0.12); border: 1px solid rgba(124,198,110,0.2); color: var(--mint); }
.btn-success:hover { background: rgba(124,198,110,0.2); }

.main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 24px;
}
.stat-card .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.stat-card .value { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; color: var(--ember); }

/* Category tabs */
.cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.cat-tab {
  padding: 8px 18px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.cat-tab:hover { border-color: var(--ember); color: var(--ember); }
.cat-tab.active { background: var(--ember); border-color: var(--ember); color: #0a0705; font-weight: 700; }

/* Section header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-header h2 { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; }

/* Product table */
.product-table { width: 100%; border-collapse: collapse; }
.product-table th {
  text-align: left;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.product-table td {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(248,237,224,0.04);
  vertical-align: middle;
}
.product-table tr:last-child td { border-bottom: none; }
.product-table tr:hover td { background: rgba(255,255,255,0.02); }
.product-table tr.inactive td { opacity: 0.4; }

.product-name-cell { font-weight: 600; font-size: 0.95rem; }
.product-desc-cell { color: var(--muted); font-size: 0.82rem; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-price-cell { font-weight: 700; color: var(--ember-glow); white-space: nowrap; }
.product-cat-cell { font-size: 0.8rem; color: var(--muted); }
.product-actions { display: flex; gap: 8px; align-items: center; white-space: nowrap; }

/* Toggle switch */
.toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 22px;
  cursor: pointer;
  transition: 0.3s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; bottom: 3px;
  background: var(--muted);
  border-radius: 50%;
  transition: 0.3s;
}
.toggle input:checked + .toggle-slider { background: rgba(124,198,110,0.3); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: var(--mint); }

/* Label badges */
.label-badge {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 999px;
  margin-right: 4px;
}
.lb-beliebt { background: rgba(255,106,31,0.15); color: var(--ember); }
.lb-vegan   { background: rgba(124,198,110,0.15); color: var(--mint); }
.lb-scharf  { background: rgba(225,20,20,0.15); color: var(--chili); }
.lb-neu     { background: rgba(244,197,66,0.15); color: #f4c542; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,7,5,0.85);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  width: 100%;
  max-width: 560px;
  transform: translateY(20px);
  transition: transform 0.3s;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal h3 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; }
.modal h3 em { font-style: italic; color: var(--ember); }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.form-group label span { color: var(--chili); }
.form-control {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.form-control:focus { border-color: var(--ember); box-shadow: 0 0 0 3px rgba(255,106,31,0.1); }
.form-control.error { border-color: var(--chili); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
.checkbox-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.checkbox-item input { accent-color: var(--ember); width: 16px; height: 16px; cursor: pointer; }
.checkbox-item span { font-size: 0.88rem; }

.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 0.9rem;
  z-index: 2000;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.3s;
  max-width: 320px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(124,198,110,0.3); color: var(--mint); }
.toast.error   { border-color: rgba(225,20,20,0.3); color: var(--chili); }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--muted); }
.loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--ember); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty-state { text-align: center; padding: 60px; color: var(--muted); }
.empty-state svg { opacity: 0.3; margin-bottom: 16px; }

/* Save banner */
.save-banner {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,106,31,0.95);
  backdrop-filter: blur(8px);
  color: #0a0705;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 500;
  transform: translateY(100%);
  transition: transform 0.3s;
  font-weight: 600;
}
.save-banner.visible { transform: translateY(0); }

@media (max-width: 768px) {
  .topbar { padding: 14px 16px; }
  .main { padding: 24px 16px; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .product-desc-cell { display: none; }
  .product-cat-cell { display: none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Tasty <em>Admin</em></h1>
    <p>Menü verwalten · Preise ändern · Produkte hinzufügen</p>
    <input class="login-input" type="password" id="loginPassword" placeholder="Passwort eingeben" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Anmelden</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">Tasty <em>Admin</em></div>
    <div class="topbar-actions">
      <span style="color:var(--muted);font-size:0.85rem;" id="lastSaved"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Abmelden</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="label">Produkte total</div>
        <div class="value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Aktiv</div>
        <div class="value" id="statActive" style="color:var(--mint)">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Deaktiviert</div>
        <div class="value" id="statInactive" style="color:var(--muted)">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Kategorien</div>
        <div class="value" id="statCats">—</div>
      </div>
    </div>

    <!-- Category Tabs + Add Button -->
    <div class="section-header">
      <div class="cat-tabs" id="catTabs"></div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Produkt hinzufügen</button>
    </div>

    <!-- Table -->
    <div id="tableContainer">
      <div class="loading"><div class="loading-spinner"></div>Menü wird geladen...</div>
    </div>
  </div>
</div>

<!-- EDIT / ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Produkt <em>bearbeiten</em></h3>
    <div class="form-row">
      <div class="form-group">
        <label>Name <span>*</span></label>
        <input class="form-control" id="fName" type="text" placeholder="z.B. Döner Kebab" maxlength="80">
      </div>
      <div class="form-group">
        <label>Preis (CHF) <span>*</span></label>
        <input class="form-control" id="fPrice" type="number" step="0.10" min="0.50" max="999" placeholder="13.90">
      </div>
    </div>
    <div class="form-group">
      <label>Beschreibung</label>
      <input class="form-control" id="fDesc" type="text" placeholder="Zutaten, Hinweise..." maxlength="200">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Kategorie <span>*</span></label>
        <select class="form-control" id="fCat">
          <option value="Cheese Steak">Cheese Steak</option>
          <option value="Kebab">Kebab</option>
          <option value="Tacos">Tacos</option>
          <option value="Pizza">Pizza</option>
          <option value="Pide">Pide</option>
          <option value="Burger">Burger</option>
          <option value="Snacks">Snacks</option>
          <option value="Salate">Salate</option>
          <option value="Taschenbrot">Taschenbrot</option>
          <option value="Teller">Teller</option>
          <option value="Desserts">Desserts</option>
          <option value="Getränke">Getränke</option>
          <option value="Alkohol (18+)">Alkohol (18+)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-control" id="fActive">
          <option value="true">✓ Aktiv (bestellbar)</option>
          <option value="false">✗ Deaktiviert</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Labels</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="lBeliebt" value="beliebt"><span>🔥 Beliebt</span></label>
        <label class="checkbox-item"><input type="checkbox" id="lVegan" value="vegan"><span>🌱 Vegan</span></label>
        <label class="checkbox-item"><input type="checkbox" id="lScharf" value="scharf"><span>🌶 Scharf</span></label>
        <label class="checkbox-item"><input type="checkbox" id="lNeu" value="neu"><span>✨ Neu</span></label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteProduct()" style="display:none">Löschen</button>
      <button class="btn btn-primary" onclick="saveProduct()">Speichern</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// TASTY ADMIN PANEL
// ============================================================

const API_BASE = '/api';
let sessionToken = null;
let menu = [];
let activeCat = 'Alle';
let editingId = null;

// ---------- AUTH ----------
async function login() {
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (!pw) { errEl.textContent = 'Bitte Passwort eingeben.'; return; }

  try {
    const res = await fetch(`${API_BASE}/admin-auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (!res.ok || !data.token) throw new Error(data.error || 'Falsches Passwort');

    sessionToken = data.token;
    sessionStorage.setItem('adminToken', sessionToken);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    document.getElementById('loginPassword').value = '';
  }
}

function logout() {
  sessionToken = null;
  sessionStorage.removeItem('adminToken');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

async function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadMenu();
}

// ---------- LOAD MENU ----------
async function loadMenu() {
  document.getElementById('tableContainer').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Menü wird geladen...</div>';
  try {
    const res = await fetch(`${API_BASE}/menu`);
    const data = await res.json();
    menu = data.menu || [];
    renderAll();
  } catch (e) {
    document.getElementById('tableContainer').innerHTML = `<div class="empty-state"><p style="color:var(--chili)">Fehler beim Laden: ${e.message}</p></div>`;
  }
}

// ---------- RENDER ----------
function renderAll() {
  renderStats();
  renderCatTabs();
  renderTable();
}

function renderStats() {
  const active   = menu.filter(m => m.active !== false).length;
  const inactive = menu.filter(m => m.active === false).length;
  const cats     = new Set(menu.map(m => m.cat)).size;
  document.getElementById('statTotal').textContent   = menu.length;
  document.getElementById('statActive').textContent  = active;
  document.getElementById('statInactive').textContent = inactive;
  document.getElementById('statCats').textContent    = cats;
}

function renderCatTabs() {
  const cats = ['Alle', ...new Set(menu.map(m => m.cat))];
  document.getElementById('catTabs').innerHTML = cats.map(c =>
    `<button class="cat-tab${c === activeCat ? ' active' : ''}" onclick="setCat('${c.replace(/'/g,"\\'")})">${c}</button>`
  ).join('');
}

function setCat(cat) {
  activeCat = cat;
  renderCatTabs();
  renderTable();
}

function renderTable() {
  const items = activeCat === 'Alle' ? menu : menu.filter(m => m.cat === activeCat);
  if (items.length === 0) {
    document.getElementById('tableContainer').innerHTML = `<div class="empty-state"><p>Keine Produkte in dieser Kategorie.</p></div>`;
    return;
  }
  const rows = items.map(item => {
    const labels = (item.labels || []).map(l => `<span class="label-badge lb-${l}">${l}</span>`).join('');
    const inactive = item.active === false ? ' inactive' : '';
    return `
    <tr class="${inactive}">
      <td class="product-name-cell">${esc(item.name)}</td>
      <td class="product-cat-cell">${esc(item.cat)}</td>
      <td class="product-desc-cell">${esc(item.desc || '')}</td>
      <td><span>${labels}</span></td>
      <td class="product-price-cell">CHF ${Number(item.price).toFixed(2)}</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${item.active !== false ? 'checked' : ''} onchange="toggleActive('${esc(item.id)}', this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td class="product-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${esc(item.id)}')">Bearbeiten</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table class="product-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Kategorie</th>
          <th>Beschreibung</th>
          <th>Labels</th>
          <th>Preis</th>
          <th>Aktiv</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ---------- TOGGLE ACTIVE ----------
async function toggleActive(id, active) {
  const item = menu.find(m => m.id === id);
  if (!item) return;
  item.active = active;
  renderStats();
  await saveMenuToServer();
}

// ---------- MODAL ----------
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').innerHTML = 'Produkt <em>hinzufügen</em>';
  document.getElementById('deleteBtn').style.display = 'none';
  clearForm();
  openModal();
}

function openEditModal(id) {
  const item = menu.find(m => m.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('modalTitle').innerHTML = 'Produkt <em>bearbeiten</em>';
  document.getElementById('deleteBtn').style.display = 'inline-flex';

  document.getElementById('fName').value  = item.name || '';
  document.getElementById('fPrice').value = item.price || '';
  document.getElementById('fDesc').value  = item.desc || '';
  document.getElementById('fCat').value   = item.cat || 'Kebab';
  document.getElementById('fActive').value = String(item.active !== false);

  ['beliebt','vegan','scharf','neu'].forEach(l => {
    document.getElementById('l' + l.charAt(0).toUpperCase() + l.slice(1)).checked =
      (item.labels || []).includes(l);
  });

  openModal();
}

function clearForm() {
  ['fName','fDesc','fPrice'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCat').value = 'Kebab';
  document.getElementById('fActive').value = 'true';
  ['Beliebt','Vegan','Scharf','Neu'].forEach(l => document.getElementById('l' + l).checked = false);
  document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));
}

function openModal()  { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }

// ---------- SAVE PRODUCT ----------
async function saveProduct() {
  const name  = document.getElementById('fName').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const desc  = document.getElementById('fDesc').value.trim();
  const cat   = document.getElementById('fCat').value;
  const active = document.getElementById('fActive').value === 'true';
  const labels = ['beliebt','vegan','scharf','neu'].filter(l =>
    document.getElementById('l' + l.charAt(0).toUpperCase() + l.slice(1)).checked
  );

  // Validierung
  let valid = true;
  if (!name || name.length < 2) {
    document.getElementById('fName').classList.add('error');
    valid = false;
  } else { document.getElementById('fName').classList.remove('error'); }
  if (!price || price < 0.5 || price > 999 || isNaN(price)) {
    document.getElementById('fPrice').classList.add('error');
    valid = false;
  } else { document.getElementById('fPrice').classList.remove('error'); }
  if (!valid) { showToast('Bitte alle Pflichtfelder ausfüllen.', 'error'); return; }

  if (editingId) {
    // Bearbeiten
    const item = menu.find(m => m.id === editingId);
    if (item) { item.name = name; item.price = Math.round(price * 100) / 100; item.desc = desc; item.cat = cat; item.active = active; item.labels = labels; }
  } else {
    // Neu
    const newId = cat.toLowerCase().slice(0,3).replace(/[^a-z]/g,'') + '_' + Date.now();
    menu.push({ id: newId, name, price: Math.round(price * 100) / 100, desc, cat, active, labels });
  }

  closeModal();
  renderAll();
  await saveMenuToServer();
}

// ---------- DELETE ----------
async function deleteProduct() {
  if (!editingId) return;
  const item = menu.find(m => m.id === editingId);
  if (!item) return;
  if (!confirm(`"${item.name}" wirklich löschen?`)) return;
  menu = menu.filter(m => m.id !== editingId);
  closeModal();
  renderAll();
  await saveMenuToServer();
  showToast('Produkt gelöscht.', 'success');
}

// ---------- SAVE TO SERVER ----------
async function saveMenuToServer() {
  try {
    const res = await fetch(`${API_BASE}/admin-menu`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + sessionToken,
      },
      body: JSON.stringify({ menu }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      if (res.status === 401) { logout(); return; }
      throw new Error(d.error || 'Fehler beim Speichern');
    }
    const now = new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('lastSaved').textContent = 'Gespeichert ' + now;
    showToast('Änderungen gespeichert ✓', 'success');
  } catch (e) {
    showToast('Fehler: ' + e.message, 'error');
  }
}

// ---------- TOAST ----------
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ---------- INIT ----------
document.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('adminToken');
  if (saved) { sessionToken = saved; showApp(); }
});

// ESC schliesst Modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
